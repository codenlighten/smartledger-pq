# A 4-node SmartLedger-Chain devnet in containers.
#
# Prereq — generate keystores, a docker-addressed genesis, and per-node configs:
#     cargo run -p slc-node --bin slc-node -- init-devnet ./deploy/devnet 4 --docker
# then:
#     docker compose -f deploy/docker-compose.yml up
#
# Node 0's client RPC is published on host 127.0.0.1:7000. Notarize with:
#     slc notarize <file> <client.key> 127.0.0.1:7000
version: "3.8"

x-node: &node
  image: smartledger-chain:latest
  restart: unless-stopped
  volumes:
    - ./devnet:/data
  networks: [slc]

services:
  node0:
    <<: *node
    command: ["slc-node", "run", "/data/node0.config.json"]
    ports:
      - "127.0.0.1:7000:7000" # client RPC exposed to the host
  node1:
    <<: *node
    command: ["slc-node", "run", "/data/node1.config.json"]
  node2:
    <<: *node
    command: ["slc-node", "run", "/data/node2.config.json"]
  node3:
    <<: *node
    command: ["slc-node", "run", "/data/node3.config.json"]

networks:
  slc:
    driver: bridge
